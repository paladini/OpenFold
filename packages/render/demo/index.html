<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OpenFold render demo</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
      #app { display: flex; flex-direction: column; height: 100%; }
      #controls { display: flex; gap: 12px; align-items: center; padding: 12px; background: #1e293b; flex-wrap: wrap; }
      #viewport { flex: 1; position: relative; }
      #viewport canvas { display: block; width: 100%; height: 100%; }
      button, input { font: inherit; }
      button { background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; padding: 6px 12px; cursor: pointer; }
      button:hover { background: #475569; }
      label { display: flex; align-items: center; gap: 6px; }
      #badge { position: absolute; background: #f59e0b; color: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 12px; pointer-events: none; transform: translate(-50%, -100%); }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="controls">
        <label>Seed <input id="seed" type="number" value="1" style="width: 80px" /></label>
        <label>Preset
          <select id="preset">
            <option value="easy">easy</option>
            <option value="medium" selected>medium</option>
            <option value="hard">hard</option>
          </select>
        </label>
        <button id="regen">Regenerate</button>
        <button id="fold">Fold</button>
        <button id="unfold">Unfold</button>
        <label>Scrub <input id="scrub" type="range" min="0" max="1" step="0.01" value="0" style="width: 200px" /></label>
        <span id="status"></span>
      </div>
      <div id="viewport">
        <div id="badge" style="display: none">face:0</div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
