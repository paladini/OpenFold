name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: TypeScript (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w typecheck
      - run: pnpm -w lint
      - run: pnpm -w test
      - run: pnpm --filter @openfold/core test:coverage
      - run: pnpm -w build

  desktop:
    name: Rust (test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install webview build dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: cargo test -p openfold-desktop
      - run: cargo build -p openfold-desktop
