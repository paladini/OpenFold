name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: TypeScript (typecheck, lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w typecheck
      - run: pnpm -w lint
      - run: pnpm -w test
      - run: pnpm --filter @openfold/core test:coverage
      - run: pnpm -w build

  desktop:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.label }}
      - name: Install webview build dependencies (Linux)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev xvfb
      - name: Build the SPA bundle (rust-embed's compile-time dependency)
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @openfold/web run build
      - run: cargo test -p openfold-desktop
      - run: cargo build --release -p openfold-desktop
      - name: Measure footprint budgets (Windows)
        if: matrix.label == 'windows'
        run: pwsh crates/desktop/scripts/measure.ps1
      - name: Measure footprint budgets (macOS)
        if: matrix.label == 'macos'
        run: bash crates/desktop/scripts/measure.sh
      - name: Measure footprint budgets (Linux, virtual display)
        if: matrix.label == 'linux'
        env:
          OPENFOLD_MEASURE_XVFB: '1'
        run: bash crates/desktop/scripts/measure.sh
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: openfold-desktop-${{ matrix.label }}
          path: |
            target/release/openfold-desktop
            target/release/openfold-desktop.exe
          if-no-files-found: ignore
          retention-days: 14
